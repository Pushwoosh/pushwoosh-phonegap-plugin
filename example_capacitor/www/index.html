<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
  <title>PW Capacitor VoIP Demo</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; background: #f5f5f5; }
    h1 { font-size: 1.2rem; }
    .log { background: #fff; border: 1px solid #ddd; padding: 12px; margin-top: 16px;
           font-family: monospace; font-size: 0.85rem; max-height: 60vh; overflow-y: auto; }
    .log-entry { border-bottom: 1px solid #eee; padding: 4px 0; }
    button { padding: 10px 20px; margin: 4px; font-size: 1rem; }
  </style>
</head>
<body>
  <h1>Pushwoosh Capacitor VoIP Demo</h1>
  <div>
    <button id="btnInit">Initialize Pushwoosh</button>
    <button id="btnRegister">Register for Push</button>
    <button id="btnVoipSubscribe">Subscribe VoIP Events</button>
    <button id="btnCallPermission">Request Call Permission</button>
  </div>
  <div class="log" id="log"></div>

  <script src="cordova.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
