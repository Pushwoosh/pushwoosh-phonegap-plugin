// Read from: -P, env, or (last-resort) literal placeholder
def _rawVoip = (project.findProperty('PW_VOIP_ANDROID_ENABLED')
        ?: System.getenv('PW_VOIP_ANDROID_ENABLED')
        ?: '$PW_VOIP_ANDROID_ENABLED')  // stays literal if not set

def voipEnabled = _rawVoip.toString().trim().toLowerCase() in ['1','true','yes','y']

def pluginId = 'pushwoosh-cordova-plugin'
def pluginDirCandidates = [
        file("${rootDir}/../plugins/${pluginId}"),
        file("${rootDir}/../../plugins/${pluginId}")
]
def pluginDir = pluginDirCandidates.find { it.exists() }
def callsSrc = pluginDir ? new File(pluginDir, 'src/android/src/com/pushwoosh/plugin/pushnotifications/calls') : null

def applyVoip = {
    if (voipEnabled) {
        println "[${pluginId}] PW_VOIP_ANDROID_ENABLED=true — enabling VoIP (dependency + sources)"
        dependencies { implementation "com.pushwoosh:pushwoosh-calls:6.7.60" }
        if (callsSrc?.exists()) {
            android.sourceSets.main.java.srcDirs += callsSrc
            println "[${pluginId}] Added optional sources: ${callsSrc}"
        } else {
            println "[${pluginId}] WARN optional sources not found at ${callsSrc}"
        }
        def voipProguardFile = pluginDir ? new File(pluginDir, 'src/android/proguard-pushwoosh-voip.pro') : null
        if (voipProguardFile?.exists()) {
            android.buildTypes.all { proguardFiles voipProguardFile }
            println "[${pluginId}] Added VoIP ProGuard rules: ${voipProguardFile}"
        }

        // Inject VoIP permissions into the app's AndroidManifest via manifest placeholder
        // This works for both Cordova and Capacitor builds
        def appProject = rootProject.subprojects.find { it.name == 'app' }
        if (appProject) {
            appProject.afterEvaluate {
                def mainManifest = new File(appProject.projectDir, 'src/main/AndroidManifest.xml')
                if (mainManifest.exists()) {
                    def content = mainManifest.text
                    def permsToAdd = [
                        'android.permission.MANAGE_OWN_CALLS',
                        'android.permission.ANSWER_PHONE_CALLS'
                    ]
                    def modified = false
                    permsToAdd.each { perm ->
                        if (!content.contains(perm)) {
                            content = content.replace('</manifest>',
                                "    <uses-permission android:name=\"${perm}\" />\n</manifest>")
                            modified = true
                        }
                    }
                    if (modified) {
                        mainManifest.text = content
                        println "[${pluginId}] Injected VoIP permissions into app AndroidManifest"
                    }
                }
            }
        }
    } else {
        println "[${pluginId}] PW_VOIP_ANDROID_ENABLED=false — VoIP disabled"
    }
}

if (project.hasProperty('cdvPluginPostBuildExtras')) {
    cdvPluginPostBuildExtras << applyVoip
} else {
    afterEvaluate { applyVoip() }
}
